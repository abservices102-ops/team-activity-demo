<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Activity Portal</title>

<style>

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h2{
    color:#0f4c81;
}

.row{
    display:flex;
    gap:15px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    flex:1;
    min-width:250px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.add-btn{
    background:#28a745;
    color:white;
}

.submit-btn{
    background:#0f4c81;
    color:white;
}

.member{
    border:1px solid #ddd;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Coordinator Information</h2>

<div class="row">
<input id="coordinatorId" placeholder="Coordinator ID">
<input id="coordinatorName" placeholder="Coordinator Name">
<input id="coordinatorEmail" placeholder="Coordinator Email">
</div>

</div>

<div class="card">

<h2>Activity Information</h2>

<div class="row">
<input id="activityDate" type="date">
</div>

</div>

<div class="card">

<h2>Team Members</h2>

<div id="membersContainer">

<div class="member">

<div class="row">
<input class="staffId" placeholder="Staff ID">
<input class="staffName" placeholder="Staff Name">
</div>

<div class="row">
<input class="department" placeholder="Department">
<input class="task" placeholder="Task">
<input class="hours" placeholder="Hours">
</div>

</div>

</div>

<br>

<button class="add-btn" onclick="addMember()">
Add Team Member
</button>

</div>

<div class="card">

<button class="submit-btn" onclick="submitActivity()">
Submit Activity
</button>

</div>

</div>

<script>

function addMember(){

let div=document.createElement("div");

div.className="member";

div.innerHTML=`

<div class="row">
<input class="staffId" placeholder="Staff ID">
<input class="staffName" placeholder="Staff Name">
</div>

<div class="row">
<input class="department" placeholder="Department">
<input class="task" placeholder="Task">
<input class="hours" placeholder="Hours">
</div>

`;

document.getElementById("membersContainer")
.appendChild(div);

}

function submitActivity(){

alert("Demo Activity Submitted Successfully");

}

</script>

</body>
</html>
